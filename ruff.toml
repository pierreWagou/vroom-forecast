target-version = "py312"
line-length = 100
exclude = ["ui/"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]

[lint.per-file-ignores]
"exploration/*" = ["E402", "B905"]  # notebook-style: late imports, zip without strict
