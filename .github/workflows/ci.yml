name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + format ──────────────────────────────────────────────────
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  # ── Python: type checking (per sub-project) ────────────────────────────────
  ty:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [training, promotion, serving, features]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Sync ${{ matrix.project }} venv
        run: uv sync
        working-directory: ${{ matrix.project }}
      - name: Type-check ${{ matrix.project }}
        run: |
          if [ -f "${{ matrix.project }}/ty.toml" ]; then
            uvx ty check --python ${{ matrix.project }}/.venv --config-file ${{ matrix.project }}/ty.toml ${{ matrix.project }}/ --exclude ${{ matrix.project }}/tests/
          else
            uvx ty check --python ${{ matrix.project }}/.venv ${{ matrix.project }}/ --exclude ${{ matrix.project }}/tests/
          fi

  # ── Python: tests (per sub-project) ────────────────────────────────────────
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [training, promotion, serving, features]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Run tests for ${{ matrix.project }}
        run: uv run --group dev pytest tests/ -v
        working-directory: ${{ matrix.project }}

  # ── TypeScript: lint + type-check + build ──────────────────────────────────
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  # ── Docker: build images ───────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: serving
            file: serving/Dockerfile
          - name: airflow
            file: airflow/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Documentation: MkDocs build ────────────────────────────────────────────
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx --with mkdocs-material mkdocs build --strict
