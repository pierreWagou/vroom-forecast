name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Verify train.py imports and loads
        run: uv run python -c "import train; print('train.py imports OK')"

      - name: Verify train.py data loading and feature engineering
        run: |
          uv run python -c "
          from train import load_data, engineer_features
          from pathlib import Path
          df = load_data(Path('data'))
          df = engineer_features(df)
          assert len(df) == 1000, f'Expected 1000 rows, got {len(df)}'
          assert 'price_diff' in df.columns
          assert 'price_ratio' in df.columns
          print('Data loading and feature engineering OK')
          "
