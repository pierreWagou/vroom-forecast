<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#593CFB"/>
      <stop offset="100%" stop-color="#00B8A9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="400" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.08" fill="white">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="160" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="200" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/><circle cx="80" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="160" cy="120" r="1.5"/><circle cx="200" cy="120" r="1.5"/>
    <circle cx="40" cy="160" r="1.5"/><circle cx="80" cy="160" r="1.5"/><circle cx="120" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="200" cy="160" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/><circle cx="80" cy="200" r="1.5"/><circle cx="120" cy="200" r="1.5"/><circle cx="160" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/>
    <circle cx="40" cy="240" r="1.5"/><circle cx="80" cy="240" r="1.5"/><circle cx="120" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/><circle cx="200" cy="240" r="1.5"/>
    <circle cx="40" cy="280" r="1.5"/><circle cx="80" cy="280" r="1.5"/><circle cx="120" cy="280" r="1.5"/><circle cx="160" cy="280" r="1.5"/><circle cx="200" cy="280" r="1.5"/>
    <circle cx="1000" cy="40" r="1.5"/><circle cx="1040" cy="40" r="1.5"/><circle cx="1080" cy="40" r="1.5"/><circle cx="1120" cy="40" r="1.5"/><circle cx="1160" cy="40" r="1.5"/>
    <circle cx="1000" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1080" cy="80" r="1.5"/><circle cx="1120" cy="80" r="1.5"/><circle cx="1160" cy="80" r="1.5"/>
    <circle cx="1000" cy="120" r="1.5"/><circle cx="1040" cy="120" r="1.5"/><circle cx="1080" cy="120" r="1.5"/><circle cx="1120" cy="120" r="1.5"/><circle cx="1160" cy="120" r="1.5"/>
    <circle cx="1000" cy="160" r="1.5"/><circle cx="1040" cy="160" r="1.5"/><circle cx="1080" cy="160" r="1.5"/><circle cx="1120" cy="160" r="1.5"/><circle cx="1160" cy="160" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/><circle cx="1040" cy="200" r="1.5"/><circle cx="1080" cy="200" r="1.5"/><circle cx="1120" cy="200" r="1.5"/><circle cx="1160" cy="200" r="1.5"/>
    <circle cx="1000" cy="240" r="1.5"/><circle cx="1040" cy="240" r="1.5"/><circle cx="1080" cy="240" r="1.5"/><circle cx="1120" cy="240" r="1.5"/><circle cx="1160" cy="240" r="1.5"/>
    <circle cx="1000" cy="280" r="1.5"/><circle cx="1040" cy="280" r="1.5"/><circle cx="1080" cy="280" r="1.5"/><circle cx="1120" cy="280" r="1.5"/><circle cx="1160" cy="280" r="1.5"/>
  </g>

  <!-- Car icon (centered above text) -->
  <g transform="translate(556, 48) scale(3.6)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/>
    <circle cx="7" cy="17" r="2"/>
    <circle cx="17" cy="17" r="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Vroom Forecast</text>

  <!-- Tagline -->
  <text x="600" y="206" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.85)" font-weight="400">End-to-end MLOps pipeline for vehicle reservation prediction</text>

  <!-- Tech pills -->
  <g transform="translate(600, 240)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600">
    <!-- Python -->
    <rect x="-290" y="0" width="80" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="-250" y="18.5" text-anchor="middle" fill="white">Python</text>
    <!-- Ray Serve -->
    <rect x="-198" y="0" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="-153" y="18.5" text-anchor="middle" fill="white">Ray Serve</text>
    <!-- MLflow -->
    <rect x="-96" y="0" width="76" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="-58" y="18.5" text-anchor="middle" fill="white">MLflow</text>
    <!-- Feast -->
    <rect x="-8" y="0" width="64" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="24" y="18.5" text-anchor="middle" fill="white">Feast</text>
    <!-- Airflow -->
    <rect x="68" y="0" width="76" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="106" y="18.5" text-anchor="middle" fill="white">Airflow</text>
    <!-- Docker -->
    <rect x="156" y="0" width="72" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="192" y="18.5" text-anchor="middle" fill="white">Docker</text>
    <!-- Next.js -->
    <rect x="240" y="0" width="72" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="276" y="18.5" text-anchor="middle" fill="white">Next.js</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="480" y="296" width="240" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>
