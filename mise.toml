# https://mise.jdx.dev/configuration.html
min_version = "2024.9.0"

# ── Tool versions ──
# `mise install` or auto-installed on `cd` into the project
[tools]
python = "3.12"
node = "lts"
uv = "latest"
mprocs = "latest"

# ── Environment ──
[env]
# Feast env vars for local dev (feature_store.yaml uses these)
FEAST_REGISTRY = "{{config_root}}/feast-data/registry.db"
FEAST_REDIS = "localhost:6379"
# Pin uv to use mise-managed Python (prevents uv from picking up its own 3.14)
UV_PYTHON = "3.12"

# ── Tasks ──

[tasks.setup]
description = "Bootstrap the project (all sub-project deps + pre-commit hooks)"
run = """
# Check Docker is available
if ! command -v docker &> /dev/null; then
  echo "ERROR: Docker is required but not installed."
  echo "       Install Docker Desktop: https://docs.docker.com/get-docker/"
  exit 1
fi
if ! docker info &> /dev/null; then
  echo "ERROR: Docker daemon is not running. Start Docker Desktop first."
  exit 1
fi

echo "Installing Python sub-project dependencies..."
for dir in training promotion serving features exploration; do
  echo "  → $dir/"
  uv sync --project "$dir" --quiet
done

echo "Installing UI dependencies..."
cd ui && npm install --silent

echo "Installing pre-commit hooks..."
uvx pre-commit install

echo ""
echo "Done! Run 'mise run dev' to start all services."
"""

[tasks.dev]
description = "Seed database, compute features, start all services"
depends = ["seed"]
run = "mprocs; docker compose down"

[tasks.check]
description = "Run all linters, type checkers, and tests (full CI-equivalent check)"
run = "uvx pre-commit run --all-files"

[tasks.seed]
description = "Seed the database and compute features (no Docker needed)"
run = """
echo "Seeding database..."
cd features && uv run python seed.py \
    --data-dir ../data \
    --db ../feast-data/vehicles.db

echo "Computing features..."
uv run python -c "
from pipeline import load_from_db, compute_features, write_parquet
v, r = load_from_db('../feast-data/vehicles.db')
df = compute_features(v, r)
write_parquet(df[df['num_reservations'].notna()], '../feast-data/vehicle_features.parquet')
"
"""

[tasks.materialize]
description = "Full materialize pipeline including online store (requires Docker services)"
run = """
cd features && uv run python pipeline.py \
    --db ../feast-data/vehicles.db \
    --feast-repo feature_repo \
    --parquet-path ../feast-data/vehicle_features.parquet
"""

[tasks.train]
description = "Train a model (requires materialized features + MLflow)"
run = """
uv run --project training python -m training \
    --feature-store feast-data/vehicle_features.parquet \
    --mlflow-uri http://localhost:5001
"""

[tasks.promote]
description = "Run champion/challenger promotion (requires trained model + Redis)"
run = """
uv run --project promotion python -m promotion \
    --mlflow-uri http://localhost:5001 \
    --redis-url redis://localhost:6379
"""

[tasks.pipeline]
description = "Run full ML pipeline: seed → materialize → train → promote"
depends = ["seed", "materialize", "train", "promote"]
