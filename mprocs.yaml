procs:
  mlflow:
    shell: "docker compose up --menu=false mlflow"
    stop: "SIGINT"
  redis:
    shell: "docker compose up --menu=false redis"
    stop: "SIGINT"
  airflow:
    shell: "docker compose up --build --menu=false airflow"
    stop: "SIGINT"
  serving:
    shell: "docker compose up --build --menu=false serving"
    stop: "SIGINT"
  ui:
    cmd: ["npm", "run", "dev"]
    cwd: "ui"
  jupyter:
    cmd: ["uv", "run", "--project", "exploration", "jupyter", "notebook", "--no-browser", "--port=8888"]
  docs:
    shell: "uvx --with mkdocs-material mkdocs serve --dev-addr 127.0.0.1:8100"
