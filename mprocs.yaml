procs:
  mlflow:
    cmd: ["docker", "compose", "up", "--menu=false", "mlflow"]
  redis:
    cmd: ["docker", "compose", "up", "--menu=false", "redis"]
  airflow:
    cmd: ["docker", "compose", "up", "--build", "--menu=false", "airflow"]
  ray-serve:
    cmd: ["docker", "compose", "up", "--build", "--menu=false", "ray-serve"]
  ui:
    cmd: ["npm", "run", "dev"]
    cwd: "ui"
  jupyter:
    cmd: ["uv", "run", "--project", "exploration", "jupyter", "notebook", "--no-browser", "--port=8888"]
  docs:
    shell: "uvx --with mkdocs-material mkdocs serve --dev-addr 127.0.0.1:8100"

keymap_procs:
  <q>: {c: force-quit}
