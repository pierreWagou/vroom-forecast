<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="45%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <!-- Sun gradient -->
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="55%" stop-color="#ff4ea0"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <!-- Sun ambient glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ff6ec7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0"/>
    </radialGradient>
    <!-- Ground -->
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#08040f"/>
    </linearGradient>
    <!-- Grid lines -->
    <linearGradient id="gridH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Car body metallic -->
    <linearGradient id="carBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e0e3a"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
    <!-- Neon glow -->
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Strong glow for tail lights -->
    <filter id="glowStrong">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip sun above horizon -->
    <clipPath id="sunClip">
      <rect x="300" y="50" width="200" height="72"/>
    </clipPath>
    <!-- Clip scan lines to sun circle -->
    <clipPath id="scanClip">
      <circle cx="400" cy="122" r="48"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="800" height="122" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="122" width="800" height="78" fill="url(#ground)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="38" cy="14" r="1" opacity="0.85"/>
    <circle cx="110" cy="38" r="0.7" opacity="0.4"/>
    <circle cx="165" cy="8" r="1.1" opacity="0.65"/>
    <circle cx="230" cy="26" r="0.6" opacity="0.3"/>
    <circle cx="290" cy="14" r="0.8" opacity="0.5"/>
    <circle cx="510" cy="10" r="1" opacity="0.6"/>
    <circle cx="580" cy="34" r="0.6" opacity="0.3"/>
    <circle cx="640" cy="16" r="0.9" opacity="0.55"/>
    <circle cx="710" cy="6" r="1.1" opacity="0.65"/>
    <circle cx="760" cy="28" r="0.7" opacity="0.35"/>
    <circle cx="72" cy="52" r="0.5" opacity="0.2"/>
    <circle cx="735" cy="48" r="0.5" opacity="0.2"/>
  </g>

  <!-- Sun glow -->
  <ellipse cx="400" cy="122" rx="140" ry="90" fill="url(#sunGlow)"/>

  <!-- Setting sun -->
  <circle cx="400" cy="122" r="48" fill="url(#sun)" opacity="0.9" clip-path="url(#sunClip)"/>
  <!-- Retro scan lines across sun (clipped to circle) -->
  <g clip-path="url(#scanClip)" opacity="0.4">
    <rect x="352" y="78" width="96" height="2.5" fill="#1a0a2e"/>
    <rect x="352" y="85" width="96" height="2.5" fill="#1a0a2e"/>
    <rect x="352" y="92" width="96" height="3" fill="#1a0a2e"/>
    <rect x="352" y="100" width="96" height="3.5" fill="#1a0a2e"/>
    <rect x="352" y="109" width="96" height="4" fill="#1a0a2e"/>
    <rect x="352" y="118" width="96" height="5" fill="#1a0a2e"/>
  </g>

  <!-- Horizon line -->
  <line x1="0" y1="122" x2="800" y2="122" stroke="#ff6ec7" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>

  <!-- Perspective grid -->
  <g stroke="url(#gridH)" stroke-width="0.7">
    <!-- Horizontal -->
    <line x1="0" y1="128" x2="800" y2="128" opacity="0.5"/>
    <line x1="0" y1="135" x2="800" y2="135" opacity="0.38"/>
    <line x1="0" y1="144" x2="800" y2="144" opacity="0.3"/>
    <line x1="0" y1="155" x2="800" y2="155" opacity="0.22"/>
    <line x1="0" y1="168" x2="800" y2="168" opacity="0.16"/>
    <line x1="0" y1="184" x2="800" y2="184" opacity="0.1"/>
    <line x1="0" y1="200" x2="800" y2="200" opacity="0.06"/>
    <!-- Vertical (converge to 400,122) -->
    <line x1="400" y1="122" x2="-60" y2="200" opacity="0.3"/>
    <line x1="400" y1="122" x2="50" y2="200" opacity="0.24"/>
    <line x1="400" y1="122" x2="140" y2="200" opacity="0.2"/>
    <line x1="400" y1="122" x2="220" y2="200" opacity="0.18"/>
    <line x1="400" y1="122" x2="290" y2="200" opacity="0.18"/>
    <line x1="400" y1="122" x2="348" y2="200" opacity="0.18"/>
    <line x1="400" y1="122" x2="400" y2="200" opacity="0.22"/>
    <line x1="400" y1="122" x2="452" y2="200" opacity="0.18"/>
    <line x1="400" y1="122" x2="510" y2="200" opacity="0.18"/>
    <line x1="400" y1="122" x2="580" y2="200" opacity="0.18"/>
    <line x1="400" y1="122" x2="660" y2="200" opacity="0.2"/>
    <line x1="400" y1="122" x2="750" y2="200" opacity="0.24"/>
    <line x1="400" y1="122" x2="860" y2="200" opacity="0.3"/>
  </g>

  <!-- ===================== -->
  <!--   CAR — REAR VIEW     -->
  <!--   The hero element    -->
  <!-- ===================== -->
  <g transform="translate(400, 200)">
    <!-- Car shadow on road -->
    <ellipse cx="0" cy="2" rx="80" ry="4" fill="#08040f" opacity="0.6"/>

    <!-- Car body — wide low-slung sports car, rear view -->
    <!-- Main body shell -->
    <path d="
      M-68,0
      L-72,-6
      L-70,-20
      L-60,-26
      L-40,-32
      L-28,-42
      L-22,-46
      L22,-46
      L28,-42
      L40,-32
      L60,-26
      L70,-20
      L72,-6
      L68,0
      Z
    " fill="url(#carBody)" stroke="#ff6ec7" stroke-width="1.2" opacity="0.95"/>

    <!-- Rear window -->
    <path d="
      M-22,-44
      L-18,-48
      L18,-48
      L22,-44
    " fill="#0f0c29" stroke="#7eb5e6" stroke-width="0.8" opacity="0.5"/>

    <!-- Cabin / roof silhouette -->
    <path d="
      M-20,-46
      L-16,-54
      L16,-54
      L20,-46
    " fill="#0a0618" stroke="#e0b0ff" stroke-width="0.7" opacity="0.35"/>

    <!-- Spoiler -->
    <path d="
      M-32,-34
      L-34,-37
      L34,-37
      L32,-34
    " fill="none" stroke="#ff6ec7" stroke-width="1" opacity="0.6"/>

    <!-- Left tail light cluster -->
    <g filter="url(#glowStrong)">
      <rect x="-66" y="-18" width="22" height="4" rx="2" fill="#ff2040" opacity="0.95"/>
      <rect x="-66" y="-18" width="22" height="4" rx="2" fill="#ff6060" opacity="0.3"/>
    </g>

    <!-- Right tail light cluster -->
    <g filter="url(#glowStrong)">
      <rect x="44" y="-18" width="22" height="4" rx="2" fill="#ff2040" opacity="0.95"/>
      <rect x="44" y="-18" width="22" height="4" rx="2" fill="#ff6060" opacity="0.3"/>
    </g>

    <!-- Center light bar connecting tail lights (thin neon strip) -->
    <line x1="-44" y1="-16" x2="44" y2="-16" stroke="#ff2040" stroke-width="0.8" opacity="0.5" filter="url(#glow)"/>

    <!-- License plate area -->
    <rect x="-12" y="-12" width="24" height="8" rx="1" fill="#1a1040" stroke="#e0b0ff" stroke-width="0.5" opacity="0.4"/>

    <!-- Exhaust pipes -->
    <ellipse cx="-40" cy="-2" rx="4" ry="2.5" fill="none" stroke="#ff6ec7" stroke-width="0.6" opacity="0.4"/>
    <ellipse cx="-32" cy="-2" rx="4" ry="2.5" fill="none" stroke="#ff6ec7" stroke-width="0.6" opacity="0.4"/>
    <ellipse cx="32" cy="-2" rx="4" ry="2.5" fill="none" stroke="#ff6ec7" stroke-width="0.6" opacity="0.4"/>
    <ellipse cx="40" cy="-2" rx="4" ry="2.5" fill="none" stroke="#ff6ec7" stroke-width="0.6" opacity="0.4"/>

    <!-- Left rear wheel -->
    <g>
      <rect x="-75" y="-12" width="10" height="14" rx="2" fill="#08040f" stroke="#ff6ec7" stroke-width="0.8" opacity="0.7"/>
      <!-- Wheel rim detail -->
      <line x1="-70" y1="-10" x2="-70" y2="0" stroke="#ff6ec7" stroke-width="0.4" opacity="0.3"/>
    </g>

    <!-- Right rear wheel -->
    <g>
      <rect x="65" y="-12" width="10" height="14" rx="2" fill="#08040f" stroke="#ff6ec7" stroke-width="0.8" opacity="0.7"/>
      <line x1="70" y1="-10" x2="70" y2="0" stroke="#ff6ec7" stroke-width="0.4" opacity="0.3"/>
    </g>

    <!-- Body lines / panel detail -->
    <line x1="-58" y1="-24" x2="-68" y2="-8" stroke="#ff6ec7" stroke-width="0.4" opacity="0.2"/>
    <line x1="58" y1="-24" x2="68" y2="-8" stroke="#ff6ec7" stroke-width="0.4" opacity="0.2"/>

    <!-- Diffuser vents -->
    <line x1="-20" y1="-4" x2="-8" y2="-4" stroke="#ff6ec7" stroke-width="0.5" opacity="0.25"/>
    <line x1="8" y1="-4" x2="20" y2="-4" stroke="#ff6ec7" stroke-width="0.5" opacity="0.25"/>
  </g>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="700" fill="white" filter="url(#textGlow)">Vroom Forecast</text>

  <!-- Subtitle -->
  <text x="400" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e0b0ff" letter-spacing="4">END-TO-END MLOPS PIPELINE</text>
</svg>
