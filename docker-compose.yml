services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --artifacts-destination /mlartifacts
