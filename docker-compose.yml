services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --artifacts-destination /mlartifacts
      --default-artifact-root mlflow-artifacts:/
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/version')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__WEBSERVER__SECRET_KEY=vroom-forecast-dev-key
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      # Feast env vars for feature_store.yaml
      - FEAST_REGISTRY=/feast-data/registry.db
      - FEAST_REDIS=redis:6379
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./training:/opt/airflow/training
      - ./promotion:/opt/airflow/promotion
      - ./features:/opt/airflow/features
      - ./data:/opt/airflow/data:ro
      - ./feast-data:/feast-data
    command: >
      bash -c "airflow db migrate
      && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      && echo admin > /opt/airflow/standalone_admin_password.txt
      && airflow standalone"

  ray-serve:
    build:
      context: .
      dockerfile: serving/Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "8265:8265"
    environment:
      - SERVING_MLFLOW_URI=http://mlflow:5000
      - SERVING_MODEL_NAME=vroom-forecast
      - SERVING_FEAST_REPO=/app/feature_repo
      - SERVING_REDIS_URL=redis://redis:6379
      - SERVING_DB_PATH=/feast-data/vehicles.db
      - SERVING_OFFLINE_STORE_PATH=/feast-data/vehicle_features.parquet
      - SERVING_AIRFLOW_URL=http://airflow:8080
      # Feast env vars for feature_store.yaml (mounted read-only)
      - FEAST_REGISTRY=/feast-data/registry.db
      - FEAST_REDIS=redis:6379
    volumes:
      - ./feast-data:/feast-data
      - ./features/feature_repo:/app/feature_repo:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/-/healthz')"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  redis-data:
