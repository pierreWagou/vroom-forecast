repos:
  # ── Python: formatting + linting ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
        exclude: ^ui/
      - id: ruff-check
        args: [--fix]
        exclude: ^ui/

  # ── Python: type checking (per sub-project) ──
  - repo: local
    hooks:
      - id: ty-training
        name: ty (training)
        entry: uvx ty check --python training/.venv training/
        language: system
        files: ^training/
        types: [python]
        pass_filenames: false

      - id: ty-promotion
        name: ty (promotion)
        entry: uvx ty check --python promotion/.venv promotion/
        language: system
        files: ^promotion/
        types: [python]
        pass_filenames: false

      - id: ty-serving
        name: ty (serving)
        entry: uvx ty check --python serving/.venv serving/
        language: system
        files: ^serving/
        types: [python]
        pass_filenames: false

      # ── TypeScript: linting ──
      - id: eslint-ui
        name: eslint (ui)
        entry: bash -c 'cd ui && npm run lint'
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false
