repos:
  # ── Python: formatting + linting ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
        exclude: ^ui/
      - id: ruff-check
        args: [--fix]
        exclude: ^ui/

  # ── Python: type checking (per sub-project) ──
  - repo: local
    hooks:
      - id: ty-training
        name: ty (training)
        entry: uvx ty check --python training/.venv --config-file training/ty.toml training/ --exclude training/tests/
        language: system
        files: ^training/
        types: [python]
        pass_filenames: false

      - id: ty-promotion
        name: ty (promotion)
        entry: uvx ty check --python promotion/.venv --config-file promotion/ty.toml promotion/ --exclude promotion/tests/
        language: system
        files: ^promotion/
        types: [python]
        pass_filenames: false

      - id: ty-serving
        name: ty (serving)
        entry: uvx ty check --python serving/.venv --config-file serving/ty.toml serving/ --exclude serving/tests/
        language: system
        files: ^serving/
        types: [python]
        pass_filenames: false

      - id: ty-features
        name: ty (features)
        entry: uvx ty check --python features/.venv --config-file features/ty.toml features/ --exclude features/tests/
        language: system
        files: ^features/
        types: [python]
        pass_filenames: false

      # ── TypeScript: linting + type checking ──
      - id: eslint-ui
        name: eslint (ui)
        entry: bash -c 'cd ui && npm run lint'
        language: system
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc-ui
        name: tsc (ui)
        entry: bash -c 'cd ui && npm run typecheck'
        language: system
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false

      # ── Python: tests (per sub-project) ──
      - id: pytest-training
        name: pytest (training)
        entry: bash -c 'cd training && uv run --group dev pytest tests/ -q'
        language: system
        files: ^training/
        types: [python]
        pass_filenames: false

      - id: pytest-promotion
        name: pytest (promotion)
        entry: bash -c 'cd promotion && uv run --group dev pytest tests/ -q'
        language: system
        files: ^promotion/
        types: [python]
        pass_filenames: false

      - id: pytest-serving
        name: pytest (serving)
        entry: bash -c 'cd serving && uv run --group dev pytest tests/ -q'
        language: system
        files: ^serving/
        types: [python]
        pass_filenames: false

      - id: pytest-features
        name: pytest (features)
        entry: bash -c 'cd features && uv run --group dev pytest tests/ -q'
        language: system
        files: ^features/
        types: [python]
        pass_filenames: false
